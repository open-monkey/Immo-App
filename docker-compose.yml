services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: immo
      POSTGRES_USER: immo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3102:3000"
    environment:
      DATABASE_URL: postgres://immo:${DB_PASSWORD}@db:5432/immo
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3101:80"
    depends_on:
      - backend

volumes:
  pgdata:
